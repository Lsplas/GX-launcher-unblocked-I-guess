<!DOCTYPE html>

    }

<iframe
  id="frame"
  src="https://xxj0nxx.github.io/GX-Launcher/"

    Open Fullscreen

<script>
  const frame = document.getElementById("frame");

  frame.onerror = () => {

    try {
