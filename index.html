<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClassLink Pad Space</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050505;
      font-family: Arial, sans-serif;
    }

    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    #overlay {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 9999;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 14px;
      background: rgba(255,255,255,0.12);
      color: white;
      backdrop-filter: blur(8px);
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
    }

    button:hover {
      background: rgba(255,255,255,0.22);
      transform: scale(1.05);
    }
  </style>
</head>
<body>

<div id="overlay">
  <button onclick="fullscreenPage()">Fullscreen</button>
  <button onclick="openDirect()">Open Direct</button>
</div>

<iframe
  src="https://rentry.org/classlinkpadspace"
  allowfullscreen
></iframe>

<script>
  function fullscreenPage() {
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen();
    }
  }

  function openDirect() {
    window.open(
      "https://rentry.org/classlinkpadspace",
      "_blank"
    );
  }
</script>

</body>
</html>
