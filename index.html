<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassLink Pad DogeUB</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .toolbar {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.14);
      color: white;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
    }

    button:hover {
      background: rgba(255,255,255,0.24);
      transform: scale(1.05);
    }
  </style>
</head>
<body>

<div class="toolbar">
  <button onclick="goFullscreen()">Fullscreen</button>
  <button onclick="openSite()">Open Direct</button>
</div>

<iframe
  src="https://rentry.org/classlinkpaddogeub"
  allowfullscreen>
</iframe>

<script>
  function goFullscreen() {
    document.documentElement.requestFullscreen();
  }

  function openSite() {
    window.open(
      "https://rentry.org/classlinkpaddogeub",
      "_blank"
    );
  }
</script>

</body>
</html>
